<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vChecker — VPN Proxy Checker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 48px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: #4f46e5;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon svg { width: 44px; height: 44px; color: #fff; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .version {
            color: #888;
            font-size: 16px;
            margin-bottom: 32px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #4f46e5;
            color: #fff;
            padding: 16px 40px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            transition: background .2s;
        }
        .btn:hover { background: #6366f1; }
        .btn svg { width: 24px; height: 24px; flex-shrink: 0; }
        .info {
            margin-top: 32px;
            color: #666;
            font-size: 13px;
            line-height: 1.6;
        }
        .loading { color: #888; font-size: 14px; margin-bottom: 32px; }
        .error { color: #ef4444; font-size: 14px; margin-bottom: 32px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
        </div>
        <h1>vChecker</h1>
        <p class="version" id="version">Загрузка…</p>
        <p class="loading" id="loading">Получение информации…</p>
        <p class="error" id="error">Не удалось загрузить информацию о версии</p>
        <a href="#" class="btn" id="downloadBtn" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Скачать APK
        </a>
        <div class="info">
            Автономный VPN/прокси чекер<br>
            Совместимость с v2rayTun, Incy, Happ
        </div>
    </div>

    <script>
        fetch('http://2.26.96.243/version')
            .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json() })
            .then(data => {
                document.getElementById('version').textContent = 'Версия ' + data.current_version;
                document.getElementById('loading').style.display = 'none';
                var btn = document.getElementById('downloadBtn');
                btn.href = data.update_url;
                btn.style.display = 'inline-flex';
            })
            .catch(function(e) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('version').textContent = 'Версия недоступна';
                document.getElementById('error').style.display = 'block';
            });
    </script>
</body>
</html>
